<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Critic Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#10b981',
                        dark: '#1f2937',
                        light: '#f3f4f6'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            /* Cố định chiều cao chuẩn xác trên cả iOS/Android */
            min-height: 100dvh;
        }

        /* 3D Flip Card Core Structure */
        .flip-card {
            background-color: transparent;
            perspective: 1000px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        /* Front & Back Faces */
        .flip-card-front, .flip-card-back {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background-color: white;
            overflow: hidden;
        }

        .flip-card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #e2e8f0;
        }

        /* Custom Scrollbar for smooth reading on small screens */
        .content-scroll {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }
        
        .content-scroll::-webkit-scrollbar {
            width: 4px;
        }
        
        .content-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .content-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        /* Micro-interactions */
        .btn-hover-effect {
            transition: all 0.2s ease;
        }
        .btn-hover-effect:active {
            transform: scale(0.95);
        }

        /* Speaker Pulse Animation */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
        
        .speaking {
            animation: pulse-ring 1.5s infinite;
            background-color: #e0e7ff !important;
            color: #4338ca !important;
        }
    </style>
</head>

<body class="flex flex-col items-center">

    <!-- Container giới hạn chiều rộng và tự động chiếm không gian dọc -->
    <div class="max-w-xl w-full flex-1 flex flex-col p-4 sm:p-6 mx-auto gap-4">
        
        <!-- Header & Filters -->
        <div class="flex-none text-center space-y-3">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 tracking-tight">Food Critic Phrases</h1>
            
            <!-- Filters -->
            <div class="flex justify-center gap-2 flex-wrap" id="filters">
                <button onclick="filterCards('all')" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-primary text-white shadow-sm transition-colors" data-filter="all">Tất cả</button>
                <button onclick="filterCards('compliment')" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-50 border border-gray-200 transition-colors" data-filter="compliment">Lời khen</button>
                <button onclick="filterCards('critique')" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-50 border border-gray-200 transition-colors" data-filter="critique">Góp ý</button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="flex-none w-full px-1">
            <div class="flex justify-between text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">
                <span>Tiến trình</span>
                <span id="progress-text">1 / 10</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-primary h-2 rounded-full transition-all duration-500 ease-out" style="width: 10%"></div>
            </div>
        </div>

        <!-- Khu vực thẻ: flex-1 để chiếm mọi không gian còn lại trên đt dọc. 
             min-h-[350px] để đảm bảo trên PC vẫn đủ cao -->
        <div class="relative w-full flex-1 min-h-[400px] my-2">
            
            <!-- Thiết lập Absolute để thẻ fix cứng theo khung bao ngoài, sửa lỗi sập layout di động -->
            <div id="flashcard" class="flip-card absolute inset-0 w-full h-full" onclick="toggleFlip(event)">
                <div class="flip-card-inner">
                    
                    <!-- MẶT TRƯỚC -->
                    <div class="flip-card-front absolute inset-0 w-full h-full flex flex-col">
                        <!-- Header (Nhãn) -->
                        <div class="flex-none w-full p-4 flex justify-end">
                            <span id="card-badge" class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-full bg-green-100 text-green-800 border border-green-200">Khen ngợi</span>
                        </div>
                        
                        <!-- Middle (Nội dung tự cuộn) -->
                        <div class="content-scroll flex-1 overflow-y-auto px-5 sm:px-8 flex flex-col justify-center items-center gap-3">
                            <h2 id="english-text" class="text-2xl sm:text-3xl font-bold text-gray-800 text-center leading-tight">
                                Loading...
                            </h2>
                            <p id="ipa-text" class="text-sm sm:text-base text-gray-400 font-mono italic text-center">
                                /.../
                            </p>
                            
                            <!-- Bổ sung Giải thích tiếng Anh -->
                            <div class="w-full max-w-sm mt-2">
                                <p id="english-explanation-text" class="text-xs sm:text-sm text-gray-600 text-center bg-gray-50 px-4 py-3 rounded-xl border border-gray-100 leading-relaxed shadow-inner">
                                    Explanation loading...
                                </p>
                            </div>
                        </div>
                        
                        <!-- Footer (Nút bấm, luôn cố định đáy) -->
                        <div class="flex-none w-full p-5 flex justify-center items-end relative">
                            <!-- Nút phát âm (stopPropagation để không lật thẻ khi bấm) -->
                            <button onclick="speakText(event)" class="w-14 h-14 rounded-full bg-indigo-50 text-primary hover:bg-indigo-100 transition-all btn-hover-effect focus:outline-none z-10 flex items-center justify-center shadow-sm border border-indigo-100" aria-label="Phát âm">
                                <i class="fa-solid fa-volume-high text-xl"></i>
                            </button>
                            
                            <!-- Gợi ý lật -->
                            <div class="absolute bottom-5 right-5 text-gray-300 text-xs flex flex-col items-end opacity-70">
                                <i class="fa-solid fa-rotate mb-1"></i> Lật
                            </div>
                        </div>
                    </div>
                    
                    <!-- MẶT SAU -->
                    <div class="flip-card-back absolute inset-0 w-full h-full flex flex-col">
                        <!-- Scrollable Content -->
                        <div class="content-scroll flex-1 overflow-y-auto p-6 sm:p-8 flex flex-col justify-center">
                            <h3 id="vietnamese-text" class="text-xl sm:text-2xl font-bold text-primary text-center mb-5 leading-snug">
                                Đang tải...
                            </h3>
                            
                            <div class="w-full h-px bg-gray-200 mb-5 flex-none"></div>
                            
                            <div class="w-full max-w-sm mx-auto">
                                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <i class="fa-solid fa-lightbulb"></i> Giải thích chi tiết
                                </h4>
                                <div id="explanation-text" class="text-gray-700 text-sm sm:text-base leading-relaxed space-y-2">
                                    <!-- JS sẽ nạp nội dung vào đây -->
                                </div>
                            </div>
                        </div>
                        
                        <!-- Footer mặt sau -->
                        <div class="flex-none w-full p-4 flex justify-end bg-gradient-to-t from-gray-50 to-transparent">
                            <div class="text-gray-400 text-xs flex items-center gap-1.5 bg-white/90 px-3 py-1.5 rounded-full shadow-sm backdrop-blur border border-gray-100">
                                <i class="fa-solid fa-rotate"></i> Chạm để quay lại
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="flex-none flex justify-between items-center mt-1">
            <button onclick="prevCard()" id="prev-btn" class="flex-1 max-w-[140px] flex items-center justify-center gap-2 px-4 py-3 bg-white text-gray-700 border border-gray-200 rounded-xl font-medium hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed btn-hover-effect shadow-sm">
                <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Trước</span>
            </button>
            <button onclick="nextCard()" id="next-btn" class="flex-1 max-w-[140px] flex items-center justify-center gap-2 px-4 py-3 bg-primary text-white rounded-xl font-medium hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed btn-hover-effect shadow-md">
                <span class="hidden sm:inline">Tiếp theo</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
        
    </div>

    <script>
        // Dữ liệu 10 câu Flashcard
        const flashcardsData = [
            {
                type: 'compliment',
                english: "The presentation is an absolute feast for the eyes.",
                ipa: "/ðə ˌprez.ənˈteɪ.ʃən ɪz ən ˈæb.sə.luːt fiːst fɔːr ði aɪz/",
                englishExplanation: "<strong class='text-gray-800'>Feast for the eyes:</strong> A visually pleasing or beautiful sight.",
                vietnamese: "Cách trình bày quả thực là một bữa tiệc mãn nhãn.",
                explanation: "<strong>Feast for the eyes</strong>: Dùng để mô tả một thứ gì đó cực kỳ đẹp mắt, hấp dẫn về mặt thị giác, giống như một 'bữa tiệc' cho đôi mắt."
            },
            {
                type: 'compliment',
                english: "I'm genuinely impressed by the depth of seasoning in this broth.",
                ipa: "/aɪm ˈdʒen.ju.ɪn.li ɪmˈprest baɪ ðə depθ əv ˈsiː.zən.ɪŋ ɪn ðɪs brɒθ/",
                englishExplanation: "<strong class='text-gray-800'>Depth of seasoning:</strong> Complex and well-developed flavors from careful layering of ingredients.",
                vietnamese: "Tôi thực sự ấn tượng bởi độ sâu của gia vị trong phần nước dùng này.",
                explanation: "<strong>Depth of seasoning</strong>: Hàm ý gia vị không chỉ nêm nếm hời hợt bề mặt (như chỉ mặn hay ngọt), mà có nhiều tầng hương vị phức tạp, hòa quyện và được nấu kỹ."
            },
            {
                type: 'compliment',
                english: "After a long day, this hearty stew really hit the spot.",
                ipa: "/ˈɑːf.tər ə lɒŋ deɪ, ðɪs ˈhɑː.ti stjuː ˈrɪə.li hɪt ðə spɒt/",
                englishExplanation: "<strong class='text-gray-800'>Hit the spot:</strong> Provided exactly what was needed or desired, bringing great satisfaction.",
                vietnamese: "Sau một ngày dài, món hầm thịnh soạn này thực sự đánh trúng tâm lý (rất thỏa mãn).",
                explanation: "<strong>Hit the spot</strong>: Thành ngữ chỉ việc một món ăn/thức uống mang lại cảm giác thỏa mãn tột độ, đúng lúc đang thèm hoặc đang cần."
            },
            {
                type: 'compliment',
                english: "The acidity in the vinaigrette perfectly balanced the richness of the duck.",
                ipa: "/ði əˈsɪd.ə.ti ɪn ðə ˌvɪn.ɪˈɡret ˈpɜː.fekt.li ˈbæl.ənst ðə ˈrɪtʃ.nəs əv ðə dʌk/",
                englishExplanation: "<strong class='text-gray-800'>Perfectly balanced:</strong> An ideal harmony of different flavor profiles.",
                vietnamese: "Độ chua trong nước sốt giấm đã cân bằng hoàn hảo độ ngậy của thịt vịt.",
                explanation: "<strong>Perfectly balanced</strong>: Khen ngợi sự hài hòa. Trong ẩm thực, việc cân bằng các vị (chua, cay, mặn, ngọt, ngậy) là kỹ năng quan trọng nhất của đầu bếp."
            },
            {
                type: 'compliment',
                english: "The sear on this scallop is textbook execution.",
                ipa: "/ðə sɪər ɒn ðɪs ˈskɒl.əp ɪz ˈteks.bʊk ˌek.sɪˈkjuː.ʃən/",
                englishExplanation: "<strong class='text-gray-800'>Textbook execution:</strong> Performed flawlessly, exactly as it should be done.",
                vietnamese: "Lớp vỏ áp chảo của miếng sò điệp này là một kỹ thuật chuẩn mực như sách giáo khoa.",
                explanation: "<strong>Textbook execution</strong>: Ám chỉ kỹ thuật nấu nướng quá hoàn hảo, chuẩn xác từng chi tiết giống hệt như lý thuyết trong sách giáo khoa dạy nấu ăn."
            },
            {
                type: 'critique',
                english: "The dish needs an acidic element to balance the richness.",
                ipa: "/ðə dɪʃ niːdz ən əˈsɪd.ɪk ˈel.ɪ.mənt tə ˈbæl.əns ðə ˈrɪtʃ.nəs/",
                englishExplanation: "<strong class='text-gray-800'>Balance the richness:</strong> To cut through the heavy, fatty, or creamy aspects using acidic elements.",
                vietnamese: "Món ăn cần thêm một chút vị chua để cân bằng lại độ ngấy.",
                explanation: "<strong>Balance the richness</strong>: Góp ý tinh tế khi món ăn bị ngấy (do nhiều dầu mỡ, bơ, béo). Yêu cầu thêm 'acid' (như chanh, giấm) để làm dịu lại."
            },
            {
                type: 'critique',
                english: "Unfortunately, the delicate flavor of the fish is vastly over-seasoned.",
                ipa: "/ʌnˈfɔː.tʃən.ət.li, ðə ˈdel.ɪ.kət ˈfleɪ.vər əv ðə fɪʃ ɪz ˈvɑːst.li ˌəʊ.vəˈsiː.zənd/",
                englishExplanation: "<strong class='text-gray-800'>Over-seasoned:</strong> Contains too much salt or spices, masking natural flavors.",
                vietnamese: "Đáng tiếc là hương vị tinh tế của cá đã bị nêm nếm quá đậm vị.",
                explanation: "<strong>Over-seasoned</strong>: Lời chê khéo léo thay vì nói 'quá mặn'. Nó ngụ ý đầu bếp đã lạm dụng gia vị làm át đi hương vị tự nhiên của nguyên liệu chính."
            },
            {
                type: 'critique',
                english: "The plating is cluttered; it could benefit from more negative space.",
                ipa: "/ðə ˈpleɪ.tɪŋ ɪz ˈklʌt.əd; ɪt kʊd ˈben.ɪ.fɪt frəm mɔːr ˈneɡ.ə.tɪv speɪs/",
                englishExplanation: "<strong class='text-gray-800'>Negative space:</strong> Empty space on the plate left blank to highlight the food.",
                vietnamese: "Cách trình bày bị lộn xộn; nó sẽ tốt hơn nếu có thêm khoảng trống trên đĩa.",
                explanation: "<strong>Negative space</strong>: Thuật ngữ mượn từ nghệ thuật thị giác. Trong bày trí món ăn, để lại khoảng trắng (đĩa trống) giúp tôn lên chủ thể món ăn thay vì bày la liệt."
            },
            {
                type: 'critique',
                english: "There is a lack of temperature control; the purée is served cold.",
                ipa: "/ðeər ɪz ə læk əv ˈtem.prə.tʃər kənˈtrəʊl; ðə ˈpjʊə.reɪ ɪz sɜːvd kəʊld/",
                englishExplanation: "<strong class='text-gray-800'>Temperature control:</strong> Ensuring food is served at its optimal heat level.",
                vietnamese: "Thiếu sự kiểm soát nhiệt độ; sốt nghiền lại được phục vụ khi đã nguội lạnh.",
                explanation: "<strong>Temperature control</strong>: Chỉ trích về mặt kỹ thuật phục vụ. Món nóng phải ra nóng, món lạnh phải ra lạnh. Sốt nghiền (purée) thường phải giữ ấm."
            },
            {
                type: 'critique',
                english: "While the concept is intriguing, the textures are somewhat monotonic.",
                ipa: "/waɪl ðə ˈkɒn.sept ɪz ɪnˈtriː.ɡɪŋ, ðə ˈteks.tʃəz ɑːr ˈsʌm.wɒt ˌmɒn.əˈtɒn.ɪk/",
                englishExplanation: "<strong class='text-gray-800'>Monotonic textures:</strong> Lacking variety in mouthfeel; feeling uniformly the same.",
                vietnamese: "Mặc dù ý tưởng khá thú vị, nhưng kết cấu món ăn lại có phần đơn điệu.",
                explanation: "<strong>Monotonic textures</strong>: Món ăn thiếu đi sự đa dạng về cảm giác khi nhai (ví dụ: tất cả đều mềm nhũn, hoặc khô khan). Một món ngon cần đan xen giữa mềm, giòn, dai."
            }
        ];

        // Biến trạng thái
        let currentIndex = 0;
        let filteredCards = [...flashcardsData];
        let isFlipped = false;

        // Web Speech API
        const synth = window.speechSynthesis;
        let voices = [];

        // Khởi tạo
        function init() {
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => { voices = synth.getVoices(); };
            }
            updateUI();
            
            // Lắng nghe phím mũi tên
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextCard();
                else if (e.key === 'ArrowLeft') prevCard();
            });
        }

        // Lật thẻ
        function toggleFlip(event) {
            // Không lật nếu người dùng đang bôi đen chữ hoặc click vào nút mồ côi
            if (window.getSelection().toString().length > 0) return;
            
            isFlipped = !isFlipped;
            const card = document.getElementById('flashcard');
            if (isFlipped) {
                card.classList.add('flipped');
            } else {
                card.classList.remove('flipped');
            }
        }

        // Delay nội dung khi lật để text không bị ngược
        function resetFlipState(callback) {
            if (isFlipped) {
                document.getElementById('flashcard').classList.remove('flipped');
                isFlipped = false;
                setTimeout(callback, 250); // Chờ thẻ úp lại rồi mới đổi chữ
            } else {
                callback();
            }
        }

        // Cập nhật giao diện
        function updateUI() {
            if (filteredCards.length === 0) return;

            const card = filteredCards[currentIndex];
            const badge = document.getElementById('card-badge');

            // Set badge màu sắc
            if (card.type === 'compliment') {
                badge.textContent = 'Khen ngợi';
                badge.className = 'px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-full bg-green-100 text-green-800 border border-green-200 shadow-sm';
            } else {
                badge.textContent = 'Góp ý';
                badge.className = 'px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-full bg-orange-100 text-orange-800 border border-orange-200 shadow-sm';
            }

            // Gắn Text
            document.getElementById('english-text').textContent = card.english;
            document.getElementById('ipa-text').textContent = card.ipa;
            document.getElementById('english-explanation-text').innerHTML = card.englishExplanation;
            document.getElementById('vietnamese-text').textContent = card.vietnamese;
            document.getElementById('explanation-text').innerHTML = `<p>${card.explanation}</p>`;

            // Thanh tiến trình
            const progress = ((currentIndex + 1) / filteredCards.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${filteredCards.length}`;

            // Cập nhật trạng thái nút (Disable nếu ở đầu/cuối)
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === filteredCards.length - 1;
        }

        // Nút điều hướng
        function nextCard() {
            if (currentIndex < filteredCards.length - 1) {
                resetFlipState(() => {
                    currentIndex++;
                    updateUI();
                });
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                resetFlipState(() => {
                    currentIndex--;
                    updateUI();
                });
            }
        }

        // Bộ lọc danh mục
        function filterCards(type) {
            synth.cancel();
            
            // Đổi màu nút lọc
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === type) {
                    btn.classList.replace('bg-white', 'bg-primary');
                    btn.classList.replace('text-gray-600', 'text-white');
                    btn.classList.remove('hover:bg-gray-50', 'border');
                } else {
                    btn.classList.replace('bg-primary', 'bg-white');
                    btn.classList.replace('text-white', 'text-gray-600');
                    btn.classList.add('hover:bg-gray-50', 'border');
                }
            });

            // Lọc dữ liệu
            if (type === 'all') {
                filteredCards = [...flashcardsData];
            } else {
                filteredCards = flashcardsData.filter(card => card.type === type);
            }

            currentIndex = 0;
            resetFlipState(() => updateUI());
        }

        // Phát âm
        function speakText(event) {
            event.stopPropagation(); // Ngăn sự kiện click lan ra ngoài làm lật thẻ
            if (filteredCards.length === 0) return;
            
            synth.cancel();
            
            const utterance = new SpeechSynthesisUtterance(filteredCards[currentIndex].english);
            if (voices.length === 0) voices = synth.getVoices();
            
            // Ưu tiên giọng Anh-Mỹ hoặc Anh-Anh
            const englishVoice = voices.find(voice => voice.lang.includes('en-US') || voice.lang.includes('en-GB'));
            if (englishVoice) utterance.voice = englishVoice;
            
            utterance.rate = 0.85; // Đọc chậm một chút để dễ nghe

            const speakerBtn = event.currentTarget;
            speakerBtn.classList.add('speaking');
            
            utterance.onend = () => speakerBtn.classList.remove('speaking');
            utterance.onerror = () => speakerBtn.classList.remove('speaking');

            synth.speak(utterance);
        }

        // Khởi động khi tải xong trang
        window.addEventListener('DOMContentLoaded', init);
    </script>
